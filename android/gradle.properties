# Gradle JVM arguments with warning suppression
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Xlint:-options

android.useAndroidX=true
android.enableJetifier=true

# Suppress all warnings
org.gradle.warning.mode=none
org.gradle.console=plain

# Suppress obsolete Java version warnings
kotlin.jvm.target.validation.mode=ignore

# Fix Kotlin incremental compilation path issues
kotlin.incremental=false
kotlin.incremental.usePreciseJavaTracking=false
org.gradle.caching=false

# Force Java 11 for all dependencies
android.overridePathCheck=true

# Suppress Java compiler warnings
org.gradle.java.compile-classpath-packaging=true